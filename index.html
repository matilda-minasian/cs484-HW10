<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>
        This is your Giga Pet
      </h1>
    </header>

    <main>
      <section class="pet-image-container">
         <!-- Replace pet image with your own pet image -->
        <img class="pet-image" src="images/IMG_2299.jpg">
      </section>
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div>Sleepiness: <strong><span class="sleepiness"></span> snores (per min)</strong></div>

        <div class="button-container">
          <button class="treat-button">
            Treat
          </button>
          <button class="play-button">
            Play
          </button>
          <button class="exercise-button">
            Exercise
          </button>
          <button class="sleep-button">
            Sleep
          </button>
        </div>
        <div class="button-container">
          <button class="info-button">
            Log Info
          </button>
          <button class="warning-button">
            Log Warning
          </button>
          <button class="error-button">
            Log Error
          </button>
          <button class="table-button">
            Log Table
          </button>
          <button class = "group-button">
            Log Group
          </button>
          <button class = "custom-button">
            Log Custom
          </button>
          <button class = "button-404">
            Log 404
          </button>
          <button class = "type-button">
            Log TypeError
          </button>
          <button class = "violation-button">
            Log Violation
          </button>
        </div>
        <div class="pet-message"></div>
      </section>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
